appId: com.example.yourApp  # ← 自分のアプリIDに変更
---
# サンプル: ログイン → メイン画面
#
# カスタマイズ方法:
#   1. appId を自分のアプリに変更
#   2. テキストやセレクタをアプリのUIに合わせる
#   3. run_regression.sh にフローを登録
#
# ⚠️ Flutter アプリの場合:
#   - テキストマッチは正規表現を使う: text: ".*ログイン.*"
#   - inputText 後は scroll でキーボードを閉じる（hideKeyboard は非対応）
#   - 要素が見つからない場合は maestro hierarchy でツリーを確認
#   - 詳細は README.md の「Flutter アプリでの注意点」を参照

- launchApp:
    clearState: true

# OS権限ダイアログ（通知等）を自動処理
- tapOn:
    text: "許可"
    optional: true

# ログイン画面が表示されるのを待つ
# - extendedWaitUntil:
#     visible: "ログイン"
#     timeout: 10000

# ログイン操作（アプリに合わせて修正）
# - tapOn: "メールアドレス"
# - inputText: "test@example.com"
# - tapOn: "パスワード"
# - inputText: "password123"
# - tapOn: "ログイン"

# Flutter アプリの場合: inputText 後にスクロールでキーボードを閉じる
# - scroll

# メイン画面が表示されるのを確認
# - extendedWaitUntil:
#     visible: "ホーム"
#     timeout: 10000

# Flutter アプリの場合: 正規表現で部分マッチ
# - assertVisible:
#     text: ".*ホーム.*"
